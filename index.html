<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            margin: 0; padding: 0; background: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden; color: white;
            /* Custom Cursor */
            cursor: url('https://media.discordapp.net/attachments/1233881524550635650/1489974800989425845/demon-slayer-kyojuro-rengoku-and-sword-cursor-pack_-_copia.png?ex=69dc41ea&is=69daf06a&hm=848c47965df7b5e690ff3552b2bc314c2b358be1d2b0893461891b053810a08a&=&format=webp&quality=lossless&width=32&height=32'), auto;
        }

        a, #entry-overlay, .discord-link {
            cursor: url('https://media.discordapp.net/attachments/1233881524550635650/1489974800989425845/demon-slayer-kyojuro-rengoku-and-sword-cursor-pack_-_copia.png?ex=69dc41ea&is=69daf06a&hm=848c47965df7b5e690ff3552b2bc314c2b358be1d2b0893461891b053810a08a&=&format=webp&quality=lossless&width=32&height=32'), pointer;
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; filter: brightness(0.3) contrast(1.1);
            object-fit: cover;
        }

        #snow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(30px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .enter-text { font-weight: 700; letter-spacing: 5px; color: #ffffff; text-transform: uppercase; }

        .main-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }

        .profile-card {
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            padding: 3.5rem 2.5rem; 
            width: 440px;
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 0, 0, 0.05);
            position: relative;
        }

        .avatar-circle {
            width: 130px; height: 130px; border-radius: 50%;
            margin: -105px auto 1.5rem;
            border: 2px solid rgba(255, 0, 0, 1);
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.6);
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .username {
            font-size: 2.8rem; font-weight: 700; color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .username:hover { animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 red; }
            40% { transform: translate(-2px, -2px); text-shadow: -2px 0 blue; }
            60% { transform: translate(2px, 2px); text-shadow: 2px 0 red; }
            80% { transform: translate(2px, -2px); text-shadow: -2px 0 blue; }
            100% { transform: translate(0); }
        }

        .typing-text { min-height: 20px; color: #ccc; margin-bottom: 1.5rem; }

        .cursor { display: inline-block; width: 8px; background-color: white; margin-left: 2px; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .discord-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px; padding: 16px;
            margin-top: 25px; display: flex; align-items: center;
            gap: 15px; text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .discord-avatar { 
            width: 52px; height: 52px; border-radius: 50%; 
            border: 2px solid rgba(255, 0, 0, 0.5);
            overflow: hidden; 
        }

        .v3nx-tag {
            display: inline-flex;
            align-items: center;
            background: rgba(45, 45, 45, 0.8);
            border-radius: 10px;
            padding: 2px 8px;
            margin-left: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            vertical-align: middle;
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 4px;
        }

        .v3nx-tag .emoji {
            font-size: 1.2em;
            line-height: 1;
            position: relative;
            top: -1px;
        }

        .discord-link { display: inline-block; transition: transform 0.3s ease; filter: drop-shadow(0 0 5px rgba(88, 101, 242, 0.5)); }
        .discord-link:hover { transform: scale(1.2); }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="entry-overlay" onclick="startBeast()">
        <div class="enter-text">Click To Enter</div>
    </div>

    <canvas id="snow"></canvas>

    <video autoplay muted loop id="bg-video">
        <source src="https://r2.guns.lol/bca3f103-5891-4c26-be85-0447e5ae5e98.mp4" type="video/mp4">
    </video>

    <audio id="audio-player" loop>
        <source src="https://file.garden/adjw67n9rzWH8vA2/1nonly_-_VICODIN_OFFICIAL_MUSIC_VIDEO_dir._by_noahsocold_128KBPS.m4a" type="audio/mpeg">
    </audio>

    <div class="main-wrapper">
        <div class="profile-card">
            <div class="avatar-circle">
                <img src="https://r2.guns.lol/6d29ebc7-629a-407f-be48-bbbc2e3d3632.gif" alt="beast gif avatar">
            </div>
            
            <h1 class="username">beast.dev</h1>
            
            <p class="text-gray-200 font-light text-sm typing-text">
                <span id="typewriter"></span><span class="cursor">&nbsp;</span>
            </p>

            <div class="flex justify-center mb-4">
                <div class="bg-black/80 px-4 py-1.5 rounded-md border border-white/20 flex items-center gap-2 text-[10px] uppercase tracking-widest font-bold text-gray-200">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" class="w-3" alt="py">
                    <span>Python</span>
                </div>
            </div>

            <a href="https://discord.gg/xMKyqh6CZC" target="_blank" class="discord-link">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2758-3.68-.2758-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1971.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.2259 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/>
                </svg>
            </a>

            <div class="discord-card">
                <div class="discord-avatar">
                    <img src="https://tse2.mm.bing.net/th/id/OIP.1xcNwrLnhZ4NdvGvWpL0wwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" class="w-full h-full object-cover" alt="star avatar">
                </div>
                <div class="flex flex-col justify-center">
                    <div class="flex items-center">
                        <span class="font-bold text-sm text-white">beast.1x</span>
                        <div class="v3nx-tag">
                            <span class="emoji">💀</span>
                            V3NX
                        </div>
                    </div>
                    <div class="text-[11px] text-gray-300 font-medium mt-1">Solo Dev of V3nex</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initSnow() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            particles = [];
            for (let i = 0; i < 45; i++) {
                particles.push({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 1.5 + 0.5, v: Math.random() * 0.5 + 0.2 });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            updateParticles();
        }

        function updateParticles() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i]; p.y += p.v;
                if (p.y > height) { p.y = -10; p.x = Math.random() * width; }
            }
        }

        function animateSnow() { drawParticles(); requestAnimationFrame(animateSnow); }
        window.addEventListener('resize', initSnow);
        initSnow(); animateSnow();

        const textElement = document.getElementById('typewriter');
        const phrases = ["Bypassin limits...", "Scriptin my own reality", "Buildin the future", "Python Developer"];
        let phraseIndex = 0; let charIndex = 0; let isDeleting = false; let typeSpeed = 100;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--; typeSpeed = 50;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++; typeSpeed = 150;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true; typeSpeed = 2000;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; typeSpeed = 500;
            }
            setTimeout(type, typeSpeed);
        }

        function startBeast() {
            const audio = document.getElementById('audio-player');
            const overlay = document.getElementById('entry-overlay');
            audio.play().catch(e => console.log("Audio blocked"));
            overlay.classList.add('hidden');
            setTimeout(type, 1000);
        }

        (function killFavicon() {
            const newIcon = document.createElement('link');
            newIcon.rel = 'shortcut icon';
            newIcon.href = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lMREFUeNoBAgD9AgEAAAABAAExu/7UAAAAAElFTkSuQmCC';
            document.head.appendChild(newIcon);
        })();
    </script>
</body>
</html>
